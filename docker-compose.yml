services:
  mysql:
    image: mysql:8.4
    container_name: aigc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aigc}
      MYSQL_USER: ${MYSQL_USER:-aigc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aigc_password}
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aigc-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-aigc}:${MYSQL_PASSWORD:-aigc_password}@mysql:3306/${MYSQL_DATABASE:-aigc}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - '${API_PORT:-3001}:3001'

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: aigc-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  mysql_data:
